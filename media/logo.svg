<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="200" height="200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFA500" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D5B7"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#8B7355"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#FFD700" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>
  
  <!-- Radiant lines -->
  <g stroke="#FFD700" stroke-width="1.5" opacity="0.3">
    <line x1="256" y1="40" x2="256" y2="120"/>
    <line x1="256" y1="392" x2="256" y2="472"/>
    <line x1="40" y1="256" x2="120" y2="256"/>
    <line x1="392" y1="256" x2="472" y2="256"/>
    <line x1="90" y1="90" x2="140" y2="140"/>
    <line x1="372" y1="90" x2="322" y2="140"/>
    <line x1="90" y1="422" x2="140" y2="372"/>
    <line x1="372" y1="422" x2="322" y2="372"/>
    <line x1="130" y1="55" x2="165" y2="130"/>
    <line x1="382" y1="55" x2="347" y2="130"/>
    <line x1="130" y1="457" x2="165" y2="382"/>
    <line x1="382" y1="457" x2="347" y2="382"/>
    <line x1="55" y1="130" x2="130" y2="165"/>
    <line x1="457" y1="130" x2="382" y2="165"/>
    <line x1="55" y1="382" x2="130" y2="347"/>
    <line x1="457" y1="382" x2="382" y2="347"/>
  </g>
  
  <!-- Left wing -->
  <g filter="url(#shadow)">
    <path d="M 256 200 
             C 200 160, 120 100, 60 90 
             C 80 130, 90 170, 80 210 
             C 70 250, 50 280, 40 310 
             C 70 290, 100 270, 130 260 
             C 160 250, 200 240, 256 230" 
          fill="url(#wing)" opacity="0.9"/>
    <!-- Wing feather lines -->
    <path d="M 220 190 C 170 160, 110 130, 75 115" fill="none" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
    <path d="M 210 210 C 160 190, 100 170, 65 155" fill="none" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
    <path d="M 200 230 C 150 215, 90 200, 55 190" fill="none" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
    <path d="M 195 250 C 145 240, 85 235, 50 225" fill="none" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
    <path d="M 215 170 C 165 140, 105 110, 70 95" fill="none" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Right wing -->
  <g filter="url(#shadow)">
    <path d="M 256 200 
             C 312 160, 392 100, 452 90 
             C 432 130, 422 170, 432 210 
             C 442 250, 462 280, 472 310 
             C 442 290, 412 270, 382 260 
             C 352 250, 312 240, 256 230" 
          fill="url(#wing)" opacity="0.9"/>
    <!-- Wing feather lines -->
    <path d="M 292 190 C 342 160, 402 130, 437 115" fill="none" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
    <path d="M 302 210 C 352 190, 412 170, 447 155" fill="none" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
    <path d="M 312 230 C 362 215, 422 200, 457 190" fill="none" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
    <path d="M 317 250 C 367 240, 427 235, 462 225" fill="none" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
    <path d="M 297 170 C 347 140, 407 110, 442 95" fill="none" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Central divine eye -->
  <ellipse cx="256" cy="180" rx="45" ry="30" fill="#1a1a2e" stroke="#FFD700" stroke-width="2"/>
  <circle cx="256" cy="180" r="14" fill="#FFD700"/>
  <circle cx="256" cy="180" r="6" fill="#1a1a2e"/>
  <circle cx="260" cy="176" r="2" fill="#fff"/>
  
  <!-- Eye rays -->
  <g stroke="#FFD700" stroke-width="1.5" opacity="0.7">
    <line x1="256" y1="145" x2="256" y2="125"/>
    <line x1="226" y1="155" x2="215" y2="140"/>
    <line x1="286" y1="155" x2="297" y2="140"/>
    <line x1="215" y1="175" x2="200" y2="170"/>
    <line x1="297" y1="175" x2="312" y2="170"/>
  </g>
  
  <!-- Halo ring -->
  <ellipse cx="256" cy="115" rx="55" ry="15" fill="none" stroke="#FFD700" stroke-width="3" filter="url(#shadow)"/>
  <ellipse cx="256" cy="115" rx="55" ry="15" fill="none" stroke="#FFA500" stroke-width="1" opacity="0.5"/>
  
  <!-- Sacred geometry below eye -->
  <g stroke="#FFD700" stroke-width="1" opacity="0.4" fill="none">
    <polygon points="256,210 230,270 282,270"/>
    <polygon points="256,290 230,230 282,230"/>
    <circle cx="256" cy="250" r="25"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#FFD700" filter="url(#shadow)">DEV</text>
  <text x="256" y="415" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#C9A96E" letter-spacing="8">METHODOLOGY</text>
  <text x="256" y="445" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8B7355" letter-spacing="4">WORKFLOW • CODE • KNOWLEDGE</text>
</svg>
